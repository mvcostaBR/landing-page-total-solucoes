# Exemplo para Nginx. Inserir no bloco server e validar antes de ativar.

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css text/javascript application/javascript application/json application/ld+json application/manifest+json application/xml image/svg+xml;

location ~* \.(?:css|js|svg|webp|png|jpg|jpeg|ico)$ {
  expires 1y;
  add_header Cache-Control "public, max-age=31536000, immutable";
}

location ~* \.html$ {
  expires -1;
  add_header Cache-Control "no-cache, must-revalidate";
}

add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
